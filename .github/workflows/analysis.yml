name: 📊 Fuel Data Analysis Report

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🏃 Run analysis notebook
        run: |
          jupyter nbconvert --to notebook --execute notebooks/Fuel_data_analysis.ipynb \
            --output-dir=notebooks/ --output=Fuel_data_analysis_executed.ipynb
      
      - name: 📄 Convert to HTML report
        run: |
          mkdir -p reports
          jupyter nbconvert --to html notebooks/Fuel_data_analysis_executed.ipynb \
            --output-dir=reports/ --output=analysis_report.html
      
      - name: 📈 Generate summary statistics
        run: |
          python scripts/generate_summary.py
      
      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: |
            reports/
            artifacts/
          retention-days: 30
      
      - name: 💾 Commit results (if changed)
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain)" ]; then
            git add reports/ artifacts/ || true
            git commit -m "📊 Auto-generated analysis report [skip ci]" || true
            git push || true
          fi

  report:
    needs: analyze
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📋 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: analysis-reports
      
      - name: ✅ Report Status
        run: |
          echo "## 📊 Analysis Report Generated"
          echo "✅ Notebook execution completed"
          echo "📄 HTML report available in artifacts"
          ls -la reports/ || echo "No reports directory found"
